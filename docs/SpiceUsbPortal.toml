[library]
version = "0.1.0"
authors = "Marco Köpcke"
license = "MIT"
description = "Bridge between spice-gtk and the XDG Desktop USB Portal"
browse_url = "https://github.com/theCapypara/spice-gtk-usb-portal/"
repository_url = "https://github.com/theCapypara/spice-gtk-usb-portal.git"
devhelp = true
search_index = true
dependencies = ["GObject-2.0", "Gio-2.0", "Gtk-4.0", "SpiceClientGLib-2.0"]

[dependencies."GObject-2.0"]
name = "GObject"
description = "The base type system library"
docs_url = "https://docs.gtk.org/gobject/"

[dependencies."Gio-2.0"]
name = "GIO"
description = "GObject Interfaces and Objects, Networking, IPC, and I/O"
docs_url = "https://docs.gtk.org/gio/"

[dependencies."Gtk-4.0"]
name = "Gtk"
description = "The GTK toolkit"
docs_url = "https://docs.gtk.org/gtk4/"

[dependencies."SpiceClientGLib-2.0"]
name = "SpiceClientGLib"
description = "SPICE client GLib library"
docs_url = "https://gitlab.freedesktop.org/spice/spice-gtk"

[theme]
name = "basic"
show_index_summary = true
show_class_hierarchy = true

[source-location]
base_url = "https://github.com/theCapypara/spice-gtk-usb-portal/-/blob/main/"
