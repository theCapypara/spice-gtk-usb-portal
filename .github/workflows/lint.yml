name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    container:
      image: fedora:42
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/action/setup-fedora
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    container:
      image: fedora:42
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/action/setup-fedora
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
