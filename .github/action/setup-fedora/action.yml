name: 'Setup Fedora'
description: 'Installs system deps + Rust toolchain (and optionally cargo-c + GIR/Vala/docs tooling) on a Fedora container.'
inputs:
  c-bindings:
    description: 'Set to "true" to also install gobject-introspection, vala, gi-docgen, python3-gobject, and cargo-c.'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Install base system deps
      shell: bash
      run: |
        dnf install -y \
          gcc gcc-c++ pkgconf-pkg-config make git curl findutils \
          glib2-devel spice-glib-devel gtk4-devel openssl-devel

    - name: Install C-bindings tooling
      if: inputs.c-bindings == 'true'
      shell: bash
      run: |
        dnf install -y \
          gobject-introspection-devel vala vala-devel \
          python3-gobject gi-docgen sed

    - name: Install Rust
      shell: bash
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --default-toolchain stable --profile minimal \
              --component clippy --component rustfmt
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: 'true'
        cache-bin: 'true'

    - name: Install cargo-c
      if: inputs.c-bindings == 'true'
      shell: bash
      run: |
        if ! command -v cargo-cinstall >/dev/null; then
          cargo install cargo-c --locked
        fi
